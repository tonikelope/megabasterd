settings.smartproxy.ban_time.tooltip=<html>Bir hatadan sonra bir proxy'nin tekrar seçilebilir olmadan önce ne kadar süre<br>(saniye) yasaklı kalacağı. 0 = kalıcı yasak: giriş ilk hatada canlı havuzdan<br>kaldırılır.<br>1..9 = kabul edilir ama riskli: yasaklanan proxy, onu yasaklayan worker başka<br>bir yerde yeniden denemeyi bitirmeden tekrar seçilebilir, bu da havuz churn'üne<br>neden olur.<br>Önerilen aralık: 10..3600.</html>
settings.smartproxy.force.tooltip=<html>OFF (varsayılan) = PASİF mod: proxyler yalnızca MEGA HTTP 509 döndürdükten sonra<br>(günlük bant genişliği kotası) ya da 509 sonrası yeniden kontrol penceresi<br>içindeyken (bu sekmedeki "Recheck window" spinner'ı) kullanılır. O zamana kadar<br>doğrudan chunk'lar.<br>ON = FORCE modu: her chunk, kota durumundan bağımsız olarak bir proxy üzerinden yönlendirilir.<br>Proxyleri test etmek için veya MEGA zaten IP'nizi sınırlandırıyorsa kullanışlıdır.</html>
settings.smartproxy.refresh.tooltip=<html>MegaBasterd proxy listesini '#URL' kaynaklarından (veya satır içi<br>özel listeyi) ne sıklıkta yeniden indirir / yeniden ayrıştırır.<br>509 sonrası SmartProxy penceresiyle (Quota recovery diyaloğu,<br>Düzenle menüsü) AYNI ŞEY DEĞİL; o, bu indirmenin 509 hatasından<br>sonra ne kadar süre SmartProxy üzerinde kalacağını kontrol eder.</html>
settings.smartproxy.timeout.tooltip=<html>Proxy'ye bağlanırken TCP+TLS el sıkışma zaman aşımı (saniye).<br>Aralık 3..120. 3 s altında çoğu genel proxy el sıkışmayı tamamlayamaz<br>ve her girişim zaman aşımına uğrar; 120 s üzerinde worker tek bir ölü<br>proxy'yi beklerken backoff zamanlayıcısını yakar.</html>
