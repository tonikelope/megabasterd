ui.quota.recovery_panel_title=Kurtarma davranışı
ui.quota.auto_resume_ip=IP değişiminde indirmeleri otomatik olarak sürdür (VPN)
ui.quota.auto_resume_ip.tooltip=<html>Etkinleştirildiğinde, 509 bekleme süresindeki ChunkDownloader<br>çalışanları 30 saniyede bir genel IP'yi yeniden kontrol eder ve IP<br>değiştiğinde bekleme süresini hemen sonlandırır — örn. bir VPN açıldığında.<br>Yalnızca ağınız IP'yi kararsız tespit ediyorsa devre dışı bırakın.</html>
ui.quota.stall_timeout_label=Kota durakla bekçi zaman aşımı (sn):
ui.quota.stall_timeout.tooltip=<html>En az bir çalışan 509 beklemesinde ise ve bu kadar saniye<br>boyunca hiçbir parça inmediyse, bekçi indirmeyi otomatik<br>yeniden deneme için işaretler. Daha düşük = gerçek kotadan<br>daha hızlı kurtarma; daha yüksek = kısa 509 aksaklıklarına tolerans. (30 .. 3600)</html>
ui.quota.recheck_window_label=SmartProxy 509 yeniden kontrol penceresi (sn):
ui.quota.recheck_window.tooltip=<html>Bir 509'dan sonra SmartProxy bu indirme için ne kadar süre<br>etkin kalır, ayrı parçalar başarılı olsa bile.<br>MEGA'nın bant genişliği kotaları kullanıcının doğrudan<br>göremediği bir pencerede sıfırlanır; eskiden 3600 s sabitti. (60 .. 86400)</html>
