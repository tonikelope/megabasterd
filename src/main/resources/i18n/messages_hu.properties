# Quota recovery & SmartProxy (509) dialog
ui.menu.quota_recovery=Kvótavisszaállítás & SmartProxy (509)
ui.quota.title=Kvótavisszaállítás & SmartProxy
ui.quota.recovery_panel_title=Visszaállítási viselkedés
ui.quota.auto_resume_ip=Letöltések automatikus folytatása IP-váltáskor (VPN)
ui.quota.auto_resume_ip.tooltip=<html>Ha bekapcsolva, az 509 visszavárakozásban lévő ChunkDownloader<br>worker-ek 30 másodpercenként ellenőrzik a publikus IP-t,<br>és azonnal kilépnek a várakozásból, ha az IP megváltozott —<br>pl. VPN aktiválása után. Csak instabil IP-felismerésnél kapcsolja ki.</html>
ui.quota.stall_timeout_label=Kvóta-elakadás watchdog időtúllépés (mp):
ui.quota.stall_timeout.tooltip=<html>Ha legalább egy worker 509 visszavárakozásban van és<br>nem érkezik chunk ennyi másodpercig, a watchdog a letöltést<br>automatikus újrapróbálkozásra jelöli. Alacsonyabb = gyorsabb<br>helyreállítás; magasabb = rövid 509-ek tolerálása. (30 .. 3600)</html>
ui.quota.recheck_window_label=SmartProxy 509 újraellenőrzési ablak (mp):
ui.quota.recheck_window.tooltip=<html>Mennyi ideig marad aktív a SmartProxy egy 509 után<br>ennél a letöltésnél, akkor is, ha az egyes chunk-ok sikeresek.<br>A MEGA sávszélesség-kvótái olyan ablakban frissülnek, amit<br>a felhasználó közvetlenül nem lát; korábban 3600 s volt. (60 .. 86400)</html>
ui.quota.diagnostics_panel_title=Diagnosztika
ui.quota.current_ip_label=Aktuális publikus IP:
ui.quota.ip_checking=(ellenőrzés...)
ui.quota.ip_unavailable=(nem elérhető)
ui.quota.refresh_ip_button=Frissítés
ui.quota.test_proxy_button=SmartProxy-lista tesztelése
ui.quota.test_proxy.tooltip=<html>Beolvassa a konfigurált SmartProxy-listát (vagy távoli URL-t)<br>és minden bejegyzéshez 3 másodperces TCP-kapcsolódást próbál.<br>Jelzi, melyek elérhetők. Nem küld valós MEGA-kérést.</html>
ui.quota.batch_size_label=Párhuzamos próbák:
ui.quota.batch_size.tooltip=<html>Hány TCP-próba fut párhuzamosan.<br>Magasabb érték = nagy listáknál hamarabb végez, de több<br>socketet és CPU-t használ. Az alapértelmezett 20 a legtöbb otthoni hálózaton biztonságos.<br>Tartomány 1..100.</html>
ui.quota.save_button=Mentés
ui.quota.cancel_button=Mégse
ui.quota.help=<html><i>Ezek a beállítások csak a HTTP 509 (MEGA sávszélesség-kvóta) helyreállítást érintik; a SmartProxy-lista maga a Beállítások &rarr; SmartProxy alatt található.</i></html>
