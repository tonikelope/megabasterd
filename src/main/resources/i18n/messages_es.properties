ui.quota.stall_timeout.tooltip=<html>Cuando al menos un worker está esperando por 509 y no llega<br>ningún chunk durante este número de segundos, el vigilante<br>marca la descarga para reintento automático. Más bajo = recuperación<br>más rápida tras una cuota real; más alto = tolerar 509 momentáneos. (30 .. 3600)</html>
