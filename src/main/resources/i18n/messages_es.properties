ui.statusbar.jvm_ram.tooltip=<html>Pulsa para pedir a la JVM que libere memoria sin usar.<br>Por encima del 70% de -Xmx también se dispara automáticamente (con<br>un margen de 60 s entre disparos). El -Xmx por defecto de Java puede<br>ser muy grande en equipos con mucha RAM; si quieres un tope fijo,<br>arranca con p.ej. <b>java -Xmx512m -jar megabasterd.jar</b>.</html>
ui.smartproxy.refresh_now.tooltip=<html>Re-descarga la lista de proxies inmediatamente sin esperar al siguiente<br>intervalo de auto-refresh (configurado en el spinner "Re-download proxy<br>list every (minutes)" de arriba). La descarga corre en un hilo de fondo<br>para no congelar la UI; clicks consecutivos se serializan en el lock<br>interno del manager.</html>
