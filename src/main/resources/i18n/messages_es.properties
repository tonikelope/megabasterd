ui.quota.auto_resume_ip.tooltip=<html>Si está activado, los workers de ChunkDownloader en espera por 509<br>vuelven a comprobar la IP pública cada 30 s y salen del bucle de<br>espera en cuanto detectan un cambio — p. ej. al activar una VPN.<br>Desactívalo solo si tu red detecta IPs de forma inestable.</html>
ui.quota.batch_size.tooltip=<html>Cuántos sondeos TCP se lanzan en paralelo durante la acción Test de proxies.<br>Más alto = la prueba termina antes en listas grandes, pero usa más sockets y CPU.<br>El valor por defecto 20 es seguro en la mayoría de redes domésticas. Rango 1..100.<br>Este valor sólo afecta al botón Test; NO cambia la concurrencia de SmartProxy en runtime.<br>Se conserva entre sesiones.</html>
