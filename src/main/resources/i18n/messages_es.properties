settings=Ajustes
settings.smartproxy.ban_time.tooltip=<html>Cuánto tiempo (segundos) un proxy permanece baneado tras un fallo antes<br>de poder ser elegido de nuevo.<br>0 = baneo permanente: la entrada se elimina del pool al primer fallo.<br>1..9 = se respeta pero es arriesgado: el proxy baneado puede ser reelegido<br>antes de que el worker que lo baneó termine de reintentar en otro proxy,<br>provocando churn del pool.<br>Rango recomendado: 10..3600.</html>
settings.smartproxy.force.tooltip=<html>OFF (por defecto) = modo PASIVO: los proxies sólo se usan tras un HTTP 509<br>de MEGA (cuota diaria de ancho de banda), o dentro de la ventana post-509<br>(spinner "Recheck window" más abajo en esta pestaña). Mientras tanto los chunks van directos.<br>ON = modo FORCE: cada chunk se enruta por un proxy independientemente del<br>estado de cuota. Útil para probar proxies o si MEGA ya está estrangulando tu IP.</html>
settings.smartproxy.refresh.tooltip=<html>Cada cuánto MegaBasterd vuelve a descargar la lista de proxies<br>desde las URLs '#URL' (o re-procesa la lista personalizada en línea).<br>NO es lo mismo que la ventana SmartProxy post-509 del diálogo<br>Quota recovery (menú Editar), que controla cuánto tiempo esta<br>descarga sigue usando SmartProxy tras un error 509.</html>
settings.smartproxy.timeout.tooltip=<html>Timeout (segundos) del handshake TCP+TLS al conectar con un proxy.<br>Rango 3..120. Por debajo de 3 s la mayoría de proxies públicos no pueden<br>completar el handshake y cada intento expira; por encima de 120 s el worker<br>quema su backoff esperando a un solo proxy muerto.</html>
