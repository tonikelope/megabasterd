settings.smartproxy.ban_time.tooltip=<html>How long (seconds) a proxy stays banned after a failure before it can be re-selected.<br>0 = permanent ban: the entry is removed from the live pool on first failure.<br>1..9 = honoured but risky: the banned proxy can be re-selected before the worker<br>that banned it has finished retrying elsewhere, which churns the pool.<br>Recommended range: 10..3600.</html>
settings.smartproxy.force.tooltip=<html>OFF (default) = PASSIVE mode: proxies are only used after MEGA returns HTTP 509<br>(daily bandwidth quota), or while inside the post-509 recheck window<br>(Quota Recovery dialog, Edit menu). Direct chunks until then.<br>ON = FORCE mode: every chunk is routed through a proxy regardless of quota state.<br>Useful for testing proxies or when MEGA is already throttling your IP.</html>
settings.smartproxy.refresh.tooltip=<html>MegaBasterd 多久从 '#URL' 源重新下载代理列表<br>(或重新解析内联自定义列表)。与 Quota recovery 对话框<br>(编辑菜单)中的 509 后 SmartProxy 窗口不同,<br>后者控制此下载在 509 错误后保持使用 SmartProxy 的时间。</html>
