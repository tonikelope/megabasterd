settings.smartproxy.ban_time.tooltip=<html>Wie lange (Sekunden) ein Proxy nach einem Fehler gesperrt bleibt, bevor er<br>erneut ausgewählt werden kann. 0 = dauerhafte Sperre: der Eintrag wird beim<br>ersten Fehler aus dem aktiven Pool entfernt.<br>1..9 = erlaubt, aber riskant: der gesperrte Proxy kann erneut ausgewählt werden,<br>bevor der Worker, der ihn gesperrt hat, anderswo fertig wiederholt hat, was<br>den Pool churnt.<br>Empfohlener Bereich: 10..3600.</html>
settings.smartproxy.force.tooltip=<html>OFF (Standard) = PASSIV-Modus: Proxies werden nur nach einem HTTP 509 von MEGA<br>(tägliches Bandbreiten-Kontingent) oder innerhalb des Post-509-Wiederholungsfensters<br>("Recheck window"-Spinner weiter unten auf dieser Registerkarte) verwendet.<br>Bis dahin direkte Chunks.<br>ON = FORCE-Modus: Jeder Chunk wird unabhängig vom Kontingent-Status über einen Proxy geleitet.<br>Nützlich zum Testen von Proxies oder wenn MEGA Ihre IP bereits drosselt.</html>
settings.smartproxy.refresh.tooltip=<html>Wie oft MegaBasterd die Proxy-Liste von den '#URL'-Feeds neu<br>holt (oder die benutzerdefinierte Inline-Liste neu einliest).<br>NICHT dasselbe wie das Post-509-SmartProxy-Fenster im Dialog<br>Quota recovery (Menü Bearbeiten), das steuert, wie lange<br>dieser Download nach einem 509-Fehler bei SmartProxy bleibt.</html>
settings.smartproxy.timeout.tooltip=<html>TCP+TLS-Handshake-Timeout (Sekunden) bei der Verbindung zu einem Proxy.<br>Bereich 3..120. Unter 3 s können die meisten öffentlichen Proxies den Handshake<br>nicht abschließen und jeder Versuch läuft ab; über 120 s verbrennt der Worker<br>seinen Backoff-Timer und wartet auf einen einzelnen toten Proxy.</html>
