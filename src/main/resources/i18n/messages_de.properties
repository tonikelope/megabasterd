ui.quota.auto_resume_ip=Downloads bei IP-Änderung automatisch fortsetzen (VPN)
ui.quota.auto_resume_ip.tooltip=<html>Wenn aktiv, prüfen ChunkDownloader-Worker im 509-Backoff<br>alle 30 s die öffentliche IP und brechen das Warten sofort ab,<br>wenn sich die IP ändert — z. B. nach Aktivierung eines VPN.<br>Nur abschalten, wenn die IP-Erkennung instabil ist.</html>
ui.quota.batch_size.tooltip=<html>Wie viele TCP-Verbindungs-Probes parallel während der Proxy-Test-Aktion laufen.<br>Höher = der Test wird bei großen Listen schneller fertig, verbraucht aber mehr<br>Sockets und CPU. Standard 20 ist auf den meisten Heimnetzen sicher. Bereich 1..100.<br>Dieser Wert betrifft nur die Test-Schaltfläche; er ändert NICHT die Laufzeit-Concurrency<br>von SmartProxy. Wird über Sitzungen hinweg gespeichert.</html>
ui.quota.batch_size_label=Parallele Probes:
ui.tab.quota_recovery=Kontingent / 509
ui.smartproxy.refresh_now=Proxy-Liste jetzt aktualisieren
ui.smartproxy.refresh_now.tooltip=<html>Lädt die Proxy-Liste sofort neu, ohne auf das nächste Auto-Refresh-<br>Intervall zu warten (eingestellt durch den Spinner "Re-download proxy<br>list every (minutes)" oben). Das Abrufen läuft in einem Hintergrund-<br>Thread, damit die UI reaktiv bleibt; aufeinanderfolgende Klicks<br>werden über den internen Lock des Managers serialisiert.</html>
