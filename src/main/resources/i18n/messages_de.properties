ui.quota.auto_resume_ip=Downloads bei IP-Änderung automatisch fortsetzen (VPN)
ui.quota.auto_resume_ip.tooltip=<html>Wenn aktiv, prüfen ChunkDownloader-Worker im 509-Backoff<br>alle 30 s die öffentliche IP und brechen das Warten sofort ab,<br>wenn sich die IP ändert — z. B. nach Aktivierung eines VPN.<br>Nur abschalten, wenn die IP-Erkennung instabil ist.</html>
ui.quota.stall_timeout_label=Kontingent-Stockungs-Timeout (s):
ui.quota.stall_timeout.tooltip=<html>Wenn mindestens ein Worker im 509-Backoff steht und für<br>diese Anzahl Sekunden kein Chunk fertig wird, markiert der<br>Watchdog den Download für automatischen Neustart. Niedriger =<br>schnellere Erholung; höher = kurze 509-Aussetzer tolerieren. (30 .. 3600)</html>
ui.quota.recheck_window_label=SmartProxy nach 509 aktiv halten für (s):
ui.quota.recheck_window.tooltip=<html>Wie lange nach einem 509 SmartProxy für diesen Download<br>aktiviert bleibt, auch wenn einzelne Chunks erfolgreich sind.<br>NICHT dasselbe wie das Aktualisierungsintervall der Proxy-Liste<br>(Einstellungen &rarr; SmartProxy), das steuert, wie oft die<br>Liste selbst neu heruntergeladen wird. (60 .. 86400)</html>
