ui.quota.test_proxy_button=SmartProxy-Liste testen
ui.quota.test_proxy.tooltip=<html>Liest die konfigurierte SmartProxy-Liste (oder Remote-URL)<br>und versucht einen 3 s TCP-Connect zu jedem Eintrag. Meldet,<br>welche erreichbar sind. Stellt keine echte MEGA-Anfrage über den Proxy.</html>
ui.quota.batch_size_label=Parallele Probes:
ui.quota.batch_size.tooltip=<html>Wie viele TCP-Probes parallel laufen.<br>Höher = bei großen Listen schneller fertig, verbraucht aber<br>mehr Sockets und CPU. Standard 20 ist auf den meisten Heimnetzen sicher.<br>Bereich 1..100.</html>
ui.quota.save_working_button=Funktionierende Proxies in die Liste speichern
ui.quota.save_working.tooltip=<html>Schreibt die Inline-IP:PORT-Einträge der benutzerdefinierten<br>Proxy-Liste neu, sodass nur die Proxies bleiben, die den Test<br>gerade bestanden haben. '#URL'-Quellzeilen bleiben erhalten.<br>Nützlich, um tote Einträge zu entfernen, ohne die URL-Feeds zu verlieren.</html>
