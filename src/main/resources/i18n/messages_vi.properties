# Quota recovery & SmartProxy (509) dialog
ui.menu.quota_recovery=Khôi phục hạn ngạch & SmartProxy (509)
ui.quota.title=Khôi phục hạn ngạch & SmartProxy
ui.quota.recovery_panel_title=Hành vi khôi phục
ui.quota.auto_resume_ip=Tự động tiếp tục tải xuống khi đổi IP (VPN)
ui.quota.auto_resume_ip.tooltip=<html>Khi bật, các worker ChunkDownloader đang chờ vì 509<br>sẽ kiểm tra lại IP công khai mỗi 30 giây và thoát ngay<br>khi phát hiện IP thay đổi — ví dụ sau khi bật VPN.<br>Chỉ tắt nếu mạng phát hiện IP không ổn định.</html>
ui.quota.stall_timeout_label=Thời gian chờ giám sát hạn ngạch (giây):
ui.quota.stall_timeout.tooltip=<html>Khi ít nhất một worker đang chờ vì 509 và không có<br>chunk nào hoàn thành trong số giây này, bộ giám sát đánh<br>dấu tải xuống để tự động thử lại. Thấp = khôi phục nhanh hơn;<br>cao = chấp nhận 509 ngắn. (30 .. 3600)</html>
ui.quota.recheck_window_label=Cửa sổ kiểm tra lại 509 SmartProxy (giây):
ui.quota.recheck_window.tooltip=<html>SmartProxy duy trì hoạt động bao lâu sau một 509<br>cho tải xuống này, ngay cả khi từng chunk thành công.<br>Hạn ngạch băng thông MEGA được đặt lại trong cửa sổ mà<br>người dùng không thể quan sát; trước đây cố định 3600 giây. (60 .. 86400)</html>
ui.quota.diagnostics_panel_title=Chẩn đoán
ui.quota.current_ip_label=IP công khai hiện tại:
ui.quota.ip_checking=(đang kiểm tra...)
ui.quota.ip_unavailable=(không khả dụng)
ui.quota.refresh_ip_button=Làm mới
ui.quota.test_proxy_button=Kiểm tra danh sách SmartProxy
ui.quota.test_proxy.tooltip=<html>Phân tích danh sách SmartProxy đã cấu hình (hoặc URL từ xa)<br>và thử kết nối TCP 3 giây tới mỗi mục. Báo cáo mục nào<br>có thể truy cập. Không thực sự gửi yêu cầu MEGA qua proxy.</html>
ui.quota.batch_size_label=Luồng song song:
ui.quota.batch_size.tooltip=<html>Số luồng kiểm tra TCP chạy song song.<br>Cao hơn = kiểm tra hoàn tất nhanh hơn với danh sách lớn, nhưng<br>dùng nhiều socket và CPU hơn. Mặc định 20 an toàn cho hầu hết mạng gia đình.<br>Phạm vi 1..100.</html>
ui.quota.save_working_button=Lưu proxy hoạt động vào danh sách
ui.quota.save_working.tooltip=<html>Viết lại các mục IP:PORT nội tuyến trong danh sách proxy tùy chỉnh<br>để chỉ giữ lại các proxy vừa vượt qua bài kiểm tra.<br>Các dòng nguồn '#URL' được giữ nguyên. Hữu ích để dọn dẹp các mục chết<br>mà không mất các nguồn URL.</html>
ui.quota.save_working.title=Lưu proxy hoạt động
ui.quota.save_working.confirm=<html>Thay thế các mục IP:PORT nội tuyến trong danh sách proxy tùy chỉnh<br>bằng {0} proxy hoạt động vừa vượt qua bài kiểm tra?<br><br>Các dòng nguồn '#URL' sẽ được giữ lại.</html>
ui.quota.save_working.done=[INFO] Đã lưu {0} proxy hoạt động vào danh sách tùy chỉnh.
ui.quota.save_working.error=[LỖI] Không thể lưu proxy hoạt động: {0}
ui.quota.save_button=Lưu
ui.quota.cancel_button=Huỷ
ui.quota.help=<html><i>Các thiết lập này chỉ ảnh hưởng đến việc khôi phục HTTP 509 (hạn ngạch băng thông MEGA); danh sách SmartProxy chính nằm trong Cài đặt &rarr; SmartProxy.</i></html>
