# Quota recovery & SmartProxy (509) dialog -- hand-built (not via NetBeans form),
# so every label, tooltip, button text and proxy-test output line goes through
# I18n.tr explicitly. Wired into the Edit menu by MainPanel.
ui.menu.quota_recovery=Quota recovery & SmartProxy (509)
ui.quota.title=Quota recovery & SmartProxy
ui.quota.recovery_panel_title=Recovery behaviour
ui.quota.auto_resume_ip=Auto-resume downloads on IP change (VPN)
ui.quota.auto_resume_ip.tooltip=<html>When enabled, ChunkDownloader workers in 509 backoff<br>re-check the public IP every 30 s and break out of the backoff<br>immediately if the IP changed -- e.g. you activated a VPN.<br>Disable only if your network has unstable IP detection.</html>
ui.quota.stall_timeout_label=Quota stall watchdog timeout (s):
ui.quota.stall_timeout.tooltip=<html>When at least one worker is in 509 backoff and no<br>chunk has landed for this many seconds, the watchdog flags<br>the download for auto-retry. Lower = recover faster after a<br>real quota; higher = tolerate brief 509 hiccups. (30 .. 3600)</html>
ui.quota.recheck_window_label=Keep SmartProxy active after 509 for (s):
ui.quota.recheck_window.tooltip=<html>How long after a 509 the SmartProxy logic stays armed for<br>this download even if individual chunks succeed. NOT the same<br>as the proxy-list refresh interval (Settings &rarr; SmartProxy),<br>which controls how often the pool itself is re-downloaded.<br>(60 .. 86400)</html>
ui.quota.diagnostics_panel_title=Diagnostics
ui.quota.current_ip_label=Current public IP:
ui.quota.ip_checking=(checking...)
ui.quota.ip_unavailable=(unavailable)
ui.quota.refresh_ip_button=Refresh
ui.quota.test_proxy_button=Test SmartProxy list
ui.quota.test_proxy.tooltip=<html>Parse the configured SmartProxy list (or remote URL)<br>and attempt a 3 s TCP connect to each entry. Reports which<br>are reachable. Does not actually proxy a MEGA request.</html>
ui.quota.batch_size_label=Concurrent probes:
ui.quota.batch_size.tooltip=<html>How many TCP connect probes run in parallel.<br>Higher = the test finishes faster on big lists, but uses<br>more sockets and CPU. Default 20 is safe on most home networks.<br>Range 1..100.</html>
ui.quota.save_working_button=Save working proxies to custom list
ui.quota.save_working.tooltip=<html>Rewrite the inline IP:PORT entries of the custom proxy list<br>so that only the proxies that just passed the test remain.<br>'#URL' source lines are preserved. Useful to prune dead entries<br>without losing the URL feeds that produced the list.</html>
ui.quota.save_working.title=Save working proxies
ui.quota.save_working.confirm=<html>Replace the inline IP:PORT entries in the custom proxy list<br>with the {0} working proxies that just passed the test?<br><br>'#URL' source lines will be kept.</html>
ui.quota.save_working.done=[INFO] Saved {0} working proxies to the custom list.
ui.quota.save_working.error=[ERROR] Could not save working proxies: {0}
ui.quota.save_button=Save
