ui.quota.save_working.confirm=<html>Sostituisci le voci IP:PORT inline dell'elenco proxy personalizzata<br>con i {0} proxy funzionanti che hanno appena superato il test?<br><br>Le righe '#URL' verranno mantenute.</html>
