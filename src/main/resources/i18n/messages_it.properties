ui.quota.auto_resume_ip.tooltip=<html>Se attivo, i worker ChunkDownloader in attesa per 509<br>ricontrollano l'IP pubblico ogni 30 s e interrompono l'attesa<br>appena rilevano un cambio — ad es. dopo aver attivato una VPN.<br>Disattiva solo se la tua rete rileva l'IP in modo instabile.</html>
ui.quota.batch_size.tooltip=<html>Quanti test TCP vengono eseguiti in parallelo durante l'azione Test dei proxy.<br>Più alto = il test finisce prima su liste grandi, ma usa più socket e CPU.<br>Il valore predefinito 20 è sicuro nella maggior parte delle reti domestiche. Intervallo 1..100.<br>Questo valore riguarda solo il pulsante Test; NON cambia la concorrenza runtime di SmartProxy.<br>Conservato fra le sessioni.</html>
ui.quota.batch_size_label=Sondaggi paralleli:
ui.tab.quota_recovery=Quota / 509
ui.smartproxy.refresh_now=Aggiorna elenco proxy
ui.smartproxy.refresh_now.tooltip=<html>Ri-scarica l'elenco proxy immediatamente senza aspettare il prossimo<br>intervallo di aggiornamento automatico (impostato dallo spinner "Re-download proxy<br>list every (minutes)" sopra). Il fetch gira su un thread di background<br>per non bloccare la UI; click consecutivi si serializzano sul lock<br>interno del manager.</html>
