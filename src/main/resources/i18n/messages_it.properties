ui.menu.quota_recovery=Recupero quota & SmartProxy (509)
ui.quota.title=Recupero quota & SmartProxy
ui.quota.recovery_panel_title=Comportamento di recupero
ui.quota.auto_resume_ip=Riprendi automaticamente i download al cambio di IP (VPN)
ui.quota.auto_resume_ip.tooltip=<html>Se attivo, i worker ChunkDownloader in attesa per 509<br>ricontrollano l'IP pubblico ogni 30 s e interrompono l'attesa<br>appena rilevano un cambio — ad es. dopo aver attivato una VPN.<br>Disattiva solo se la tua rete rileva l'IP in modo instabile.</html>
ui.quota.stall_timeout_label=Timeout vigilante di quota (s):
ui.quota.stall_timeout.tooltip=<html>Quando almeno un worker è in attesa per 509 e nessun<br>chunk arriva per questo numero di secondi, il vigilante segna<br>il download per il riavvio automatico. Più basso = recupero<br>più veloce; più alto = tollerare brevi 509. (30 .. 3600)</html>
ui.quota.recheck_window_label=Mantieni SmartProxy attivo dopo 509 per (s):
ui.quota.recheck_window.tooltip=<html>Quanto a lungo dopo un 509 SmartProxy resta attivo per<br>questo download, anche se i singoli chunk hanno successo.<br>NON è la stessa cosa dell'intervallo di aggiornamento della<br>lista proxy (Impostazioni &rarr; SmartProxy), che controlla<br>ogni quanto la lista viene riscaricata. (60 .. 86400)</html>
ui.quota.diagnostics_panel_title=Diagnostica
