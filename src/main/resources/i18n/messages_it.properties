ui.quota.test_proxy_button=Testa lista SmartProxy
ui.quota.test_proxy.tooltip=<html>Analizza la lista SmartProxy configurata (o l'URL remoto)<br>e prova una connessione TCP di 3 s a ogni voce. Indica quali<br>sono raggiungibili. Non invia una richiesta MEGA reale.</html>
ui.quota.batch_size_label=Sondaggi paralleli:
ui.quota.batch_size.tooltip=<html>Quanti sondaggi TCP vengono eseguiti in parallelo.<br>Più alto = il test finisce prima su liste grandi, ma usa<br>più socket e CPU. Il valore predefinito 20 è sicuro nella maggior parte delle reti domestiche.<br>Intervallo 1..100.</html>
ui.quota.save_working_button=Salva proxy funzionanti nella lista
ui.quota.save_working.tooltip=<html>Riscrive le voci IP:PORT inline della lista proxy personalizzata<br>in modo che restino solo i proxy che hanno appena superato il test.<br>Le righe '#URL' vengono conservate. Utile per ripulire le voci morte<br>senza perdere gli URL che alimentano la lista.</html>
