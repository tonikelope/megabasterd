settings.smartproxy.ban_time.tooltip=<html>Quanti secondi un proxy rimane bannato dopo un errore prima di poter essere<br>riselezionato. 0 = ban permanente: la voce viene rimossa dal pool al primo errore.<br>1..9 = rispettato ma rischioso: il proxy bannato può essere riselezionato prima<br>che il worker che lo ha bannato finisca di riprovare altrove, generando churn del pool.<br>Intervallo consigliato: 10..3600.</html>
settings.smartproxy.force.tooltip=<html>OFF (predefinito) = modalità PASSIVA: i proxy si usano solo dopo un HTTP 509<br>di Mega (quota giornaliera di banda) o all'interno della finestra post-509<br>(spinner "Recheck window" più in basso in questa scheda). Fino ad allora i chunk vanno diretti.<br>ON = modalità FORCE: ogni chunk passa per un proxy a prescindere dallo stato di quota.<br>Utile per testare i proxy o quando Mega sta già limitando il tuo IP.</html>
settings.smartproxy.refresh.tooltip=<html>Ogni quanto MegaBasterd riscarica l'elenco proxy dai feed<br>'#URL' (o ri-analizza l'elenco personalizzato inline). NON è<br>la stessa cosa della finestra SmartProxy post-509 nel dialogo<br>Quota recovery (menu Modifica), che controlla per quanto<br>tempo questo download resta su SmartProxy dopo un errore 509.</html>
settings.smartproxy.timeout.tooltip=<html>Timeout (secondi) dell'handshake TCP+TLS quando ci si connette a un proxy.<br>Intervallo 3..120. Sotto i 3 s la maggior parte dei proxy pubblici non riesce<br>a completare l'handshake e ogni tentativo va in timeout; sopra i 120 s il worker<br>brucia il suo backoff aspettando un singolo proxy morto.</html>
