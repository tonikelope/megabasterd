ui.quota.recheck_window.tooltip=<html>Quanto a lungo dopo un 509 SmartProxy resta attivo per<br>questo download, anche se i singoli chunk hanno successo.<br>NON è la stessa cosa dell'intervallo di aggiornamento dell'elenco<br>proxy (Impostazioni &rarr; SmartProxy), che controlla<br>ogni quanto l'elenco viene riscaricato. (60 .. 86400)</html>
