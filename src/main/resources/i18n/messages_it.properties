ui.quota.save_working.tooltip=<html>Riscrive le voci IP:PORT inline dell'elenco proxy personalizzata<br>in modo che restino solo i proxy che hanno appena superato il test.<br>Le righe '#URL' vengono conservate. Utile per ripulire le voci morte<br>senza perdere gli URL che alimentano l'elenco.</html>
