this_option_not_recommended_upload_folder=TUỲ CHỌN NÀY KHÔNG ĐƯỢC KHUYẾN NGHỊ. Khi dùng, thư mục tải lên của MegaBasterd sẽ hiện trong tài khoản của bạn dưới dạng KHÔNG GIẢI MÃ ĐƯỢC.\n\nTại thời điểm viết văn bản này, có một cách để KHẮC PHỤC:\n\n1) Di chuyển thư mục con tải lên đầu tiên vào thư mục ROOT (CLOUD) của tài khoản.\n\n2) Vào cài đặt tài khoản và bấm RELOAD ACCOUNT.\n\nTôi không biết cách này còn hiệu lực bao lâu. SỬ DỤNG VỚI RỦI RO TỰ CHỊU.
