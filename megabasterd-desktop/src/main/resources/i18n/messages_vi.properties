settings.smartproxy.ban_time.tooltip=<html>Một proxy ở trạng thái bị cấm bao lâu (giây) sau khi gặp lỗi trước khi có thể<br>được chọn lại. 0 = cấm vĩnh viễn: mục bị xoá khỏi pool đang hoạt động ngay khi<br>gặp lỗi đầu tiên.<br>1..9 = chấp nhận nhưng rủi ro: proxy bị cấm có thể được chọn lại trước khi worker<br>cấm nó hoàn tất thử lại ở nơi khác, gây churn cho pool.<br>Phạm vi khuyến nghị: 10..3600.</html>
settings.smartproxy.force.tooltip=<html>OFF (mặc định) = chế độ PASSIVE: proxy chỉ được dùng sau khi MEGA trả về HTTP 509<br>(hạn ngạch băng thông hàng ngày), hoặc khi đang trong cửa sổ kiểm tra lại sau 509<br>(spinner "Recheck window" phía dưới trong thẻ này). Trước đó các chunk đi trực tiếp.<br>ON = chế độ FORCE: mọi chunk đều đi qua proxy bất kể trạng thái hạn ngạch.<br>Hữu ích để kiểm tra proxy hoặc khi MEGA đang giới hạn IP của bạn.</html>
settings.smartproxy.refresh.tooltip=<html>MegaBasterd tải lại danh sách proxy từ các nguồn '#URL' (hoặc<br>phân tích lại danh sách tùy chỉnh nội tuyến) với tần suất bao nhiêu.<br>KHÔNG giống cửa sổ SmartProxy sau 509 trong hộp thoại Quota<br>recovery (menu Chỉnh sửa), kiểm soát thời gian tải xuống này<br>tiếp tục dùng SmartProxy sau lỗi 509.</html>
settings.smartproxy.timeout.tooltip=<html>Thời gian chờ bắt tay TCP+TLS (giây) khi kết nối tới proxy.<br>Phạm vi 3..120. Dưới 3 s hầu hết proxy công cộng không thể hoàn thành bắt<br>tay và mọi nỗ lực đều timeout; trên 120 s worker đốt bộ định thời backoff<br>khi chờ một proxy đã chết.</html>
